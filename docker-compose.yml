services:
  osdsarvaya:
    build:
      context: .
      args:
        APP_VERSION: 1.1.0
    container_name: osdsarvaya-app
    ports:
      - "3201:3201"

    env_file:
      - production.env

    environment:
      - APP_VERSION=1.1.0

    volumes:
      - ./osdsarvaya_session:/app/server/.wwebjs_auth
      - ./osdsarvaya_data:/app/server/data

    restart: unless-stopped
    shm_size: "1gb"

    stop_grace_period: 40s   # ✅ Critical for Chromium cleanup

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3201/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  osdsarvaya_session:
  osdsarvaya_data:
