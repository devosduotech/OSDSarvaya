services:
  osdsarvaya:
    build:
      context: .
      args:
        APP_VERSION: ${APP_VERSION:-1.1.22}
    container_name: osdsarvaya-app
    ports:
      - "3001:3001"

    env_file:
      - production.env

    environment:
      - APP_VERSION=${APP_VERSION:-1.1.22}
      - TZ=Asia/Kolkata

    volumes:
      - ./osdsarvaya_session:/app/server/.wwebjs_auth
      - ./osdsarvaya_data:/app/server/data

    restart: unless-stopped
    shm_size: "1gb"

    stop_grace_period: 40s   # ✅ Critical for Chromium cleanup

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  osdsarvaya_session:
  osdsarvaya_data:
