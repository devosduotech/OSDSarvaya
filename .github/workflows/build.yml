name: Build and Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: |
          $version = (Get-Content client/package.json | ConvertFrom-Json).version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      - name: Build Electron app
        working-directory: ./client
        run: npm run electron:build

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: OSDSarvayaSetup-${{ steps.version.outputs.VERSION }}
          path: client/release/OSDSarvayaSetup.exe

      - name: Create Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: client/release/OSDSarvayaSetup.exe
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: OSDSarvaya v${{ steps.version.outputs.VERSION }}
          body: 'OSDSarvaya WhatsApp Bulk Messaging Application'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
